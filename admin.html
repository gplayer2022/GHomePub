<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="授業支援用サイトです。主に C# を扱っています。">
  <meta property="og:title" content="管理者用ページ | GHomePub">
  <meta property="og:description" content="授業支援用サイトです。主に C# を扱っています。">
  <meta property="og:site_name" content="管理者用ページ | GHomePub">
  <meta property="og:locale" content="ja_JP">
  <title>管理者用ページ | GHomePub</title>
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="stylesheet" href="css/styles.css">

  <!-- chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"
    integrity="sha512-Y51n9mtKTVBh3Jbx5pZSJNDDMyY+yGe77DGtBPzRlgsf/YLCh13kSZ3JmfHGzYFCmOndraf0sQgfM654b7dJ3w=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D8HPBTVCPM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-D8HPBTVCPM');

</head>

<body class="body">
  <div class="whole-wrapper">

    <div class="pre-header">
      <div class="pre-header-inner">
        <p class="site-description">授業支援用サイト</p>
      </div><!-- .pre-header-inner -->
    </div><!-- .pre-header -->

    <header class="header" id="sticky-header">
      <div class="header-inner">
        <h1 class="site-title">
          <a href="index.html">GHomePub</a>
        </h1>
      </div><!-- .header-inner -->
    </header>

    <div class="content-container">
      <main id="main" class="main">
        <section class="card">
          <h2 class="card-title">管理者用ページ</h2>
          <div id="pre-login" class="">
            <h3 class="card-subtitle">登録・ログイン</h3>
            <p>Google アカウントで登録またはログインしてください。</p>
            <div class="gplayer-button-wrapper">
              <button class="gplayer-button ripple" type="button" id="login">Google で登録 / ログイン</button>
            </div><!-- .gplayer-button-wrapper -->
            <p id="login-message" class="alert"></p>
          </div><!-- #pre-login -->
          <div id="post-login" class="hidden">
            <p>こんにちは、管理者さん！</p>
          </div><!-- #post-login -->
        </section><!-- .card -->

        <section id="users-card" class="card hidden">
          <h2 class="card-title">ログインユーザ一覧</h2>
          <p id="error-message"></p>
          <table class="simple-border-table">
            <thead>
              <tr>
                <th>ユーザ名</th>
                <th>ログイン状態</th>
              </tr>
            </thead>
            <tbody id="login-users">
            </tbody>
          </table>
        </section><!-- #users-card -->

        <section id="results-card" class="card hidden">
          <h2 class="card-title">結果一覧</h2>
          <div id="result-chart-wrapper">
          </div><!-- #result-chart-wrapper -->
        </section><!-- #results-card -->

        <section id="aggregations-card" class="card hidden">
          <h2 class="card-title">期間集計</h2>
          <dl class="table-like">
            <dt><label for="start-date">開始日</label></dt>
            <dd><input id="start-date" type="date"></dd>
            <dt><label for="end-date">終了日</label></dt>
            <dd><input id="end-date" type="date"></dd>
          </dl>
          <div class="gplayer-button-wrapper">
            <button id="aggregate-button" class="gplayer-button ripple" type="button">集計</button>
          </div><!-- .gplayer-button-wrapper -->
          <div id="aggregations-wrapper">

          </div><!-- #aggregations-wrapper -->
        </section>

      </main>
    </div><!-- .content-container -->

    <footer id="footer">
      <p class="copyright">&copy;GHomePub 2022</p>
    </footer><!-- .footer -->

  </div><!-- .whole-wrapper -->
  <script type="module" src="js/admin.js"></script>
  <script src="js/button.js"></script>
  <script src="js/common.js"></script>
</body>

</html>
