<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="授業支援用サイトです。主に C# を扱っています。">
  <meta property="og:title" content="タイピング | GHomePub">
  <meta property="og:description" content="授業支援用サイトです。主に C# を扱っています。">
  <meta property="og:site_name" content="タイピング | GHomePub">
  <meta property="og:locale" content="ja_JP">
  <title>タイピング | GHomePub</title>
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="stylesheet" href="css/styles.css">

  <!-- chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js" integrity="sha512-Y51n9mtKTVBh3Jbx5pZSJNDDMyY+yGe77DGtBPzRlgsf/YLCh13kSZ3JmfHGzYFCmOndraf0sQgfM654b7dJ3w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D8HPBTVCPM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-D8HPBTVCPM');
  </script>
</head>

<body class="body">
  <div class="whole-wrapper">

    <div class="pre-header">
      <div class="pre-header-inner">
        <p class="site-description">授業支援用サイト</p>
      </div><!-- .pre-header-inner -->
    </div><!-- .pre-header -->

    <header class="header" id="sticky-header">
      <div class="header-inner">
        <h1 class="site-title">
          <a href="index.html">GHomePub</a>
        </h1>
      </div><!-- .header-inner -->
    </header>

    <div class="content-container">
      <main id="main" class="main">
        <section class="card">
          <h2 class="card-title">タイピング練習帳</h2>
          <div id="pre-login" class="">
            <h3 class="card-subtitle">登録・ログイン</h3>
            <p>Google アカウントで登録またはログインしてください。</p>
            <div class="gplayer-button-wrapper">
              <button class="gplayer-button ripple" type="button" id="login">Google で登録 / ログイン</button>
            </div><!-- .gplayer-button-wrapper -->
            <p id="login-message" class="alert"></p>
          </div><!-- #pre-login -->

          <div id="post-login" class="hidden">
            <h3 class="card-subtitle">ユーザ情報</h3>
            <p>ようこそ、タイピング練習帳に！</p>
            <dl class="table-like">
              <dt>Google アカウント名</dt>
              <dd id="google-account-name"></dd>
              <dt>氏名</dt>
              <dd>
                <span id="user-name-text-wrapper" class="">
                  <input id="user-name-text" type="text" placeholder="" data-uid="">
                  <div class="small-button-wrapper">
                    <button id="user-name-button" class="small-button ripple" type="button">登録する</button>
                  </div><!-- .small-button-wrapper -->
                </span>
                <span id="user-name" class="hidden"></span>
              </dd>
            </dl>
            <p id="user-name-message" class=""></p>
          </div><!-- #post-login -->
        </section><!-- .card -->

        <section id="typing-card" class="card hidden">
          <h2 class="card-title">タイピング</h2>
          <p>出題レベルを選択して、ボタン「タイピング開始」を押下してください。</p>
          <p class="levels">
            <label class="item"><input type="radio" name="level" value="easy" checked>【初級】あいう</label>
            <label class="item"><input type="radio" name="level" value="normal">【中級】としち</label>
            <label class="item"><input type="radio" name="level" value="hard">【上級】みやび</label>
          </p>
          <div class="gplayer-button-wrapper">
            <button class="gplayer-button ripple" type="button" id="start-typing-button">タイピング開始</button>
          </div><!-- .gplayer-button-wrapper -->
          <div id="typing-board" class="overlay" tabindex="0">
            <div class="main board">
              <section class="card board-child">
                <p id="remaining-time" class="remaining-time"></p>
                <p id="question-origin" class="question-origin"></p>
                <p id="question-kana" class="question-kana"></p>
                <p id="question-roman" class="question-roman"></p>
                <p id="question-author">
                  <span id="author-origin"></span>
                  <span id="author-kana"></span>
                </p>
              </section>
            </div><!-- .main -->
          </div><!-- #typing-board -->
        </section><!-- #typing-card -->

        <section id="result-card" class="card hidden">
          <h2 class="card-title">結果</h2>
          <p>今回の記録です。</p>
          <p id="error-result" class="alert"></p>
          <dl class="table-like">
            <dt>正入力数</dt>
            <dd id="correct-count"></dd>
            <dt>誤入力数</dt>
            <dd id="incorrect-count"></dd>
          </dl>
          <p>今までの記録です。</p>
          <dl class="table-like">
            <dt>実施回数</dt>
            <dd id="counts-length"></dd>
            <dt>最高記録</dt>
            <dd id="max-correct-count"></dd>
            <dt>平均値</dt>
            <dd id="mean-correct-count"></dd>
            <dt>最低記録</dt>
            <dd id="min-correct-count"></dd>
          </dl>
          <h3 class="card-subtitle">チャート</h3>
          <div class="result-chart-wrapper">
            <canvas id="result-chart" class="result-chart"></canvas>
          </div>
        </section><!-- #result-card -->

      </main>
    </div><!-- .content-container -->

    <footer id="footer">
      <p class="copyright">&copy;GHomePub 2022</p>
    </footer><!-- .footer -->

  </div><!-- .whole-wrapper -->
  <script type="module" src="js/typing.js"></script>
  <script src="js/button.js"></script>
  <script src="js/common.js"></script>
</body>

</html>
